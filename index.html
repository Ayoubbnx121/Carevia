    <style>
        :root {
            --bg: #f8fafc; --text: #1e293b; --card: white; --border: #e2e8f0;
            --accent-light: #f4e2d8; --accent-dark: #0f4c5c; --accent-contrast: #e76f51;
            --shadow: rgba(15,76,92,0.1); --nav-link: #1e3a5f;
            --hero-bg: linear-gradient(145deg, #f0f9ff, white);
            --footer-border: #f4e2d8; --input-bg: white;
            --hour-bg: #f4e2d8; --selected-slot-bg: #e6f3f7;
            --notification-bg: #e76f51; --notification-text: white;
        }
        .dark-mode {
            --bg: #1a1e2b; --text: #e2e8f0; --card: #2d3748; --border: #4a5568;
            --accent-light: #2d3748; --accent-dark: #63b3ed; --accent-contrast: #f6ad55;
            --shadow: rgba(0,0,0,0.3); --nav-link: #cbd5e0;
            --hero-bg: linear-gradient(145deg, #2d3748, #1a202c);
            --footer-border: #4a5568; --input-bg: #2d3748;
            --hour-bg: #4a5568; --selected-slot-bg: #2c5282;
            --notification-bg: #f6ad55; --notification-text: #1a202c;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Open Sans',sans-serif; background:var(--bg); color:var(--text);
            line-height:1.5; overflow-x:hidden; transition:background 0.3s,color 0.3s;
        }
        body.rtl { font-family:'Cairo',sans-serif; direction:rtl; text-align:right; }
        body.rtl .nav-links a { margin-left:0; margin-right:2rem; }
        body.rtl .social-icons a { margin-left:0; margin-right:2rem; }
        body.rtl .back-link i { transform:rotate(180deg); }
        body.rtl .section-title::after { left:auto; right:0; }

        /* animations */
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        @keyframes slideLeft { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
        @keyframes slideRight { from{opacity:0;transform:translateX(30px);} to{opacity:1;transform:translateX(0);} }

        /* notification */
        .notification {
            position:fixed; top:20px; right:20px; background:var(--notification-bg); color:var(--notification-text);
            padding:1rem 1.5rem; border-radius:60px; box-shadow:0 10px 20px rgba(0,0,0,0.2); z-index:9999;
            display:flex; align-items:center; gap:1rem; transform:translateX(400px); transition:transform 0.3s ease;
            font-weight:600; max-width:350px;
        }
        .notification.show { transform:translateX(0); }
        .notification i { font-size:1.5rem; }
        .notification .close-btn { cursor:pointer; margin-left:auto; font-size:1.2rem; opacity:0.7; }
        .notification .close-btn:hover { opacity:1; }
        body.rtl .notification { right:auto; left:20px; transform:translateX(-400px); }
        body.rtl .notification.show { transform:translateX(0); }

        .view { display:none; max-width:1280px; margin:0 auto; padding:1.5rem 2rem 2rem; width:100%; animation:fadeIn 0.5s; }
        .active-view { display:block; }

        .logo-link { text-decoration:none; cursor:pointer; }
        .btn {
            display:inline-block; background:var(--accent-dark); color:white !important; padding:0.7rem 2rem;
            border-radius:40px; font-weight:600; border:none; cursor:pointer; transition:all 0.3s;
            font-size:1rem; box-shadow:0 6px 12px var(--shadow); text-align:center; max-width:100%;
        }
        .btn:hover { background:var(--accent-contrast) !important; transform:translateY(-3px) scale(1.02); box-shadow:0 15px 25px -8px var(--accent-contrast); }

        /* hero – crisp, shorter image */
        .hero {
            background:var(--hero-bg); border-radius:32px; padding:2.5rem 3rem; margin-bottom:2rem;
            box-shadow:0 20px 30px -10px var(--shadow); border:1px solid rgba(231,111,81,0.1);
            position:relative; overflow:hidden; min-height:280px; display:flex; flex-direction:column; justify-content:center;
        }
        .hero::before {
            content:''; position:absolute; top:0; right:0; bottom:0; left:0;
            background:linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 40%, transparent 80%);
            pointer-events:none; z-index:1;
        }
        .dark-mode .hero::before {
            background:linear-gradient(90deg, rgba(26,30,43,0.95) 0%, rgba(26,30,43,0.6) 40%, transparent 80%);
        }
        .hero::after {
            content:''; position:absolute; top:0; right:0; width:50%; height:100%;
            background:url('https://images.unsplash.com/photo-1584516150909-c43483ee7932?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80') no-repeat center center/cover;
            opacity:1; pointer-events:none; animation:slideRight 1s; z-index:0;
        }
        .hero h1, .hero p, .hero .btn { position:relative; z-index:2; max-width:50%; }
        .hero h1 { font-size:2.4rem; color:var(--accent-dark); animation:slideLeft 0.8s; }
        .hero p { animation:slideLeft 0.8s 0.1s both; }
        .hero .btn { animation:fadeIn 1s; width:fit-content; }

        /* navbar */
        .navbar {
            display:flex; align-items:center; justify-content:space-between; padding:0.8rem 0 1.2rem;
            border-bottom:1px solid var(--border); margin-bottom:2rem; flex-wrap:wrap; gap:0.8rem;
            animation:fadeIn 0.8s;
        }
        .logo { font-size:1.9rem; font-weight:700; color:var(--accent-dark); font-family:'Poppins',sans-serif; }
        .logo span { color:var(--accent-contrast); }
        .nav-links { display:flex; flex-wrap:wrap; gap:1rem; align-items:center; }
        .nav-links a {
            text-decoration:none; color:var(--nav-link); font-weight:600; transition:all 0.2s;
            cursor:pointer; white-space:nowrap; position:relative;
        }
        .nav-links a::after {
            content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px;
            background:var(--accent-contrast); transition:width 0.3s;
        }
        .nav-links a:hover::after { width:100%; }

        .lang-selector, .theme-toggle { display:flex; gap:0.5rem; align-items:center; }
        .lang-btn, .theme-btn {
            background:transparent; border:1px solid var(--border); border-radius:40px; padding:0.3rem 1rem;
            font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--nav-link); font-size:0.9rem;
        }
        .lang-btn.active { background:var(--accent-dark); color:white; border-color:var(--accent-dark); }
        .lang-btn:hover, .theme-btn:hover { transform:scale(1.05); border-color:var(--accent-contrast); }
        .theme-btn { padding:0.3rem 1rem; font-size:1rem; }

        /* services grid */
        .services-grid {
            display:grid; grid-template-columns:repeat(4,1fr); gap:2rem; margin:2.5rem 0;
        }
        .service-card {
            background:var(--card); border-radius:28px; padding:2rem 1.2rem 1.8rem; text-align:center;
            box-shadow:0 12px 24px -8px var(--shadow); transition:0.3s; border:1px solid var(--accent-light);
            cursor:pointer; width:100%; animation:fadeUp 0.6s both;
        }
        .service-card:nth-child(1) { animation-delay:0.1s; }
        .service-card:nth-child(2) { animation-delay:0.2s; }
        .service-card:nth-child(3) { animation-delay:0.3s; }
        .service-card:nth-child(4) { animation-delay:0.4s; }
        .service-card i { font-size:2.8rem; color:var(--accent-contrast); margin-bottom:1rem; transition:transform 0.3s; }
        .service-card:hover i { transform:scale(1.2) rotate(5deg); }
        .service-card:hover, .caregiver-card:hover { transform:translateY(-8px) scale(1.02); box-shadow:0 25px 35px -12px var(--accent-contrast); }

        /* caregiver cards */
        .caregiver-cards { display:flex; gap:2rem; flex-wrap:wrap; margin:2rem 0; }
        .caregiver-card {
            background:var(--card); border-radius:32px; padding:2rem 1.5rem 1.8rem; flex:1 1 260px; max-width:100%;
            box-shadow:0 15px 30px -8px var(--shadow); border:1px solid var(--accent-light); transition:0.3s; cursor:pointer;
            animation:fadeUp 0.6s both;
        }
        .caregiver-card:nth-child(1) { animation-delay:0.15s; }
        .caregiver-card:nth-child(2) { animation-delay:0.3s; }
        .caregiver-card:nth-child(3) { animation-delay:0.45s; }
        .photo-placeholder {
            width:130px; height:130px; border-radius:50%; background:var(--accent-light); margin:0 auto 1.2rem;
            display:flex; align-items:center; justify-content:center; color:var(--accent-dark); font-size:0.9rem;
            border:4px solid var(--card); box-shadow:0 6px 12px var(--shadow); overflow:hidden; transition:transform 0.3s;
        }
        .photo-placeholder img { width:100%; height:100%; object-fit:cover; }
        .rating { color:#f5b342; margin:0.5rem 0; }

        /* section title */
        .section-title {
            position:relative; display:inline-block; animation:fadeIn 0.8s; margin:2rem 0 1.5rem; color:var(--accent-dark);
        }
        .section-title::after {
            content:''; position:absolute; bottom:-10px; left:0; width:80px; height:4px;
            background:var(--accent-contrast); border-radius:2px; animation:slideLeft 0.5s 0.3s both;
        }

        /* back link */
        .back-link { cursor:pointer; color:var(--accent-dark); font-weight:600; margin:1rem 0; display:inline-block; transition:0.2s; }
        .back-link:hover { transform:translateX(-5px); }
        body.rtl .back-link:hover { transform:translateX(5px); }

        /* footer – professional */
        .main-footer {
            margin-top:4rem; padding:3rem 2rem 2rem; border-top:2px solid var(--footer-border);
            background:var(--card); border-radius:48px 48px 0 0;
        }
        .footer-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:2rem; max-width:1200px; margin:0 auto; }
        .footer-column h3 { color:var(--accent-dark); margin-bottom:1rem; font-size:1.2rem; }
        .footer-column ul { list-style:none; padding:0; }
        .footer-column ul li { margin-bottom:0.5rem; }
        .footer-column ul li a { color:var(--text); text-decoration:none; transition:color 0.2s; }
        .footer-column ul li a:hover { color:var(--accent-contrast); }
        .footer-column .social-icons { display:flex; gap:1rem; margin-top:1rem; }
        .footer-column .social-icons a { color:var(--accent-dark); font-size:1.5rem; }
        .footer-bottom { text-align:center; padding-top:2rem; color:var(--text); opacity:0.7; font-size:0.9rem; }

        /* booking card & forms */
        .booking-card {
            background:var(--card); border-radius:36px; padding:2.5rem; max-width:700px; margin:2rem auto;
            box-shadow:0 25px 40px -15px var(--shadow); width:100%; animation:fadeUp 0.6s;
        }
        .form-group { margin-bottom:2rem; }
        .form-group label { font-weight:600; display:block; margin-bottom:0.5rem; color:var(--accent-dark); }
        .form-control, .form-select {
            width:100%; padding:1rem 1.2rem; border:1.5px solid var(--accent-light); border-radius:60px;
            font-size:1rem; transition:0.3s; background:var(--input-bg); color:var(--text);
        }
        .form-control:focus, .form-select:focus { border-color:var(--accent-contrast); outline:none; box-shadow:0 0 0 4px var(--accent-light); transform:scale(1.02); }
        .hours-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:0.8rem; margin:1.5rem 0; }
        .hour-option {
            background:var(--hour-bg); border-radius:60px; padding:0.8rem 0.5rem; text-align:center;
            border:1px solid transparent; transition:0.2s; cursor:pointer; font-weight:600; color:var(--text);
        }
        .hour-option.selected { background:var(--accent-dark); color:white; border-color:var(--accent-dark); }
        .selected-slots-list { background:var(--selected-slot-bg); border-radius:40px; padding:1rem 1.5rem; margin:1rem 0; word-break:break-word; animation:fadeIn 0.5s; }

        .payment-option { background:var(--bg); border-radius:32px; padding:1.5rem; margin:1rem 0; transition:0.2s; }
        .payment-option:hover { transform:translateY(-3px); }
        .credit-card-fields { display:grid; grid-template-columns:2fr 1fr 1fr; gap:1rem; margin-top:1rem; }

        .checkmark { font-size:6rem; color:var(--accent-contrast); text-align:center; animation:pulse 2s infinite; }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.05);} 100%{transform:scale(1);} }

        /* mobile */
        @media (max-width:768px) {
            .view { padding:1rem 1.2rem 1.5rem; }
            .navbar { flex-direction:column; align-items:stretch; }
            .nav-links { justify-content:center; }
            .hero h1 { font-size:2rem !important; }
            .hero h1, .hero p, .hero .btn { max-width:100%; }
            .hero::after { width:100%; opacity:0.3; }
            .services-grid { grid-template-columns:repeat(2,1fr); gap:1rem; }
            .caregiver-card { flex:1 1 100%; max-width:400px; margin:0 auto; }
            .hours-grid { grid-template-columns:repeat(2,1fr); }
            .footer-grid { grid-template-columns:1fr; }
        }
        @media (max-width:480px) {
            .services-grid { grid-template-columns:1fr; }
            .hours-grid { grid-template-columns:1fr; }
            .hero h1 { font-size:1.7rem !important; }
            .section-title { font-size:1.7rem; }
            .credit-card-fields { grid-template-columns:1fr; }
        }
        select.form-select { appearance:none; background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat:no-repeat; background-position:right 1rem center; background-size:1em; }
    </style>
</head>

        let currentLang = 'en';
        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
            document.body.classList.toggle('rtl', lang === 'ar');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang]?.[key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = translations[lang][key];
                    else el.textContent = translations[lang][key];
                }
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.dataset.i18nPlaceholder;
                if (translations[lang]?.[key]) el.placeholder = translations[lang][key];
            });
            updateSelectedSlotsDisplay?.();
        }

        // notification
        function showNotif(msg) { document.getElementById('notifMsg').innerText = msg; document.getElementById('notification').classList.add('show'); setTimeout(()=>hideNotif(),4000); }
        window.hideNotif = ()=>document.getElementById('notification').classList.remove('show');

        // history & navigation
        let viewStack = ['homeView'];
        function navigateTo(viewId) {
            if (document.querySelector('.active-view').id !== viewId) {
                viewStack.push(viewId);
                history.pushState({view:viewId, stack:viewStack.slice()}, '', '#'+viewId);
                showView(viewId);
            }
        }
        function goBack() {
            if (viewStack.length>1) {
                viewStack.pop();
                const prev = viewStack[viewStack.length-1];
                history.pushState({view:prev, stack:viewStack.slice()}, '', '#'+prev);
                showView(prev);
            } else if (document.querySelector('.active-view').id !== 'homeView') {
                viewStack = ['homeView'];
                history.pushState({view:'homeView', stack:['homeView']}, '', '#homeView');
                showView('homeView');
            }
        }
        window.onpopstate = (e) => {
            if (e.state?.view) {
                viewStack = e.state.stack || [e.state.view];
                showView(e.state.view);
            } else { viewStack = ['homeView']; showView('homeView'); }
        };

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(viewId).classList.add('active-view');
            if (!document.getElementById(viewId).querySelector('.main-footer')) {
                const footer = document.getElementById('footer-template').firstElementChild.cloneNode(true);
                document.getElementById(viewId).appendChild(footer);
                setLanguage(currentLang); // update footer i18n
            }
            if (viewId === 'timeSlotView') { setMinDate(); generateHourSlots(); }
            if (viewId === 'paymentMethodView') updatePaymentSummary();
        }

        }

        // booking state
        let selectedService = 'homeCare';
        let clientInfo = {};
        let selectedDate = '', selectedSlots = [], selectedCaregiverKey = null;
        const serviceNames = { homeCare:'Home Care', medicalAcc:'Medical Accompaniment', personalCare:'Personal Care', companionship:'Companionship' };

        function startBookingFlow() { selectedService='homeCare'; navigateTo('clientInfoView'); }
        function selectServiceAndGoToClientInfo(s) { selectedService=s; navigateTo('clientInfoView'); }

        function saveClientInfoAndGoToTimeSlot() {
            clientInfo = {
                firstName: document.getElementById('clientFirstName')?.value.trim() || 'Ahmed',
                lastName: document.getElementById('clientLastName')?.value.trim() || 'Benali',
                city: document.getElementById('clientCity')?.value || 'Tangier',
                phone: document.getElementById('clientPhone')?.value.trim() || '+212600000000',
                email: document.getElementById('clientEmail')?.value.trim() || 'client@example.com'
            };
            selectedSlots = [];
            navigateTo('timeSlotView');
        }

        function setMinDate() {
            const today = new Date().toISOString().split('T')[0];
            const el = document.getElementById('slotDate');
            if (el) { el.setAttribute('min', today); el.value = today; }
        }
        function generateHourSlots() {
            const container = document.getElementById('hoursContainer');
            if (!container) return;
            container.innerHTML = '';
            for (let i=0; i<24; i++) {
                const start = i.toString().padStart(2,'0')+':00', end = (i+1).toString().padStart(2,'0')+':00';
                const div = document.createElement('div');
                div.className = 'hour-option'; div.textContent = `${start} – ${end}`;
                div.dataset.slot = `${start} – ${end}`;
                div.onclick = () => {
                    div.classList.toggle('selected');
                    if (div.classList.contains('selected')) selectedSlots.push(div.dataset.slot);
                    else selectedSlots = selectedSlots.filter(s => s !== div.dataset.slot);
                    updateSelectedSlotsDisplay();
                };
                container.appendChild(div);
            }
        }
        function updateSelectedSlotsDisplay() {
            const d = document.getElementById('selectedSlotsDisplay');
            if (!d) return;
            if (selectedSlots.length===0) d.innerText = translations[currentLang].noHours;
            else d.innerHTML = '<strong>' + (currentLang==='ar'?'الساعات المحددة:':currentLang==='fr'?'Heures sélectionnées:':'Selected hours:') + '</strong> ' + selectedSlots.join(' · ');
        }

        function confirmTimeSlot() {
            selectedDate = document.getElementById('slotDate')?.value;
            if (!selectedDate) { showNotif(translations[currentLang].dateLabel + ' required'); return; }
            if (selectedSlots.length===0) { showNotif(translations[currentLang].noHours); return; }
            const container = document.getElementById('chooseCaregiverList');
            container.innerHTML = '';
            Object.entries(caregiversData).forEach(([key,c]) => {
                const imgSrc = key==='mohamedAyoub'?'Ayoub.jpg':'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-1.2.1&auto=format&fit=crop&w=200&q=80';
                const card = document.createElement('div');
                card.className = 'caregiver-card'; card.style.cursor = 'pointer';
                card.innerHTML = `<div class="photo-placeholder"><img src="${imgSrc}" alt="${c.name}"></div><h3>${c.name}</h3><p>${c.age} ans • ${c.occ} • ${c.loc}</p><div class="rating">⭐ ${c.rating}/5</div>`;
                card.onclick = () => { selectedCaregiverKey = key; navigateTo('paymentMethodView'); };
                container.appendChild(card);
            });
            navigateTo('chooseCaregiverView');
        }

        function updatePaymentSummary() {
            const c = caregiversData[selectedCaregiverKey];
            if (!c) return;
            const total = selectedSlots.length * 50;
            document.getElementById('paymentSummary').innerHTML = `
                <p><strong>${translations[currentLang].serviceHome}:</strong> ${serviceNames[selectedService]}</p>
                <p><strong>${translations[currentLang].firstName}:</strong> ${clientInfo.firstName} ${clientInfo.lastName}, ${clientInfo.city}</p>
                <p><strong>${translations[currentLang].dateLabel}:</strong> ${selectedDate}</p>
                <p><strong>${translations[currentLang].selectHours}:</strong> ${selectedSlots.join(' · ')} (${selectedSlots.length}h)</p>
                <p><strong>${translations[currentLang].navCaregivers}:</strong> ${c.name} (${c.rating}/5)</p>
                <hr><p style="font-size:1.8rem; font-weight:700;">Total: ${total} MAD</p>
            `;
        }

        // payment validation
        document.addEventListener('change', e => {
            if (e.target.name === 'paymentMethod') {
                document.getElementById('cardFields').style.display = e.target.value === 'card' ? 'block' : 'none';
            }
        });
        document.addEventListener('input', e => {
            if (e.target.id === 'cardExpiry') {
                let val = e.target.value.replace(/\D/g,'');
                if (val.length>=2) val = val.slice(0,2)+'/'+val.slice(2,4);
                e.target.value = val;
            }
        });

        function processPayment() {
            const method = document.querySelector('input[name="paymentMethod"]:checked').value;
            if (method === 'card') {
                const num = document.getElementById('cardNumber').value.trim();
                const exp = document.getElementById('cardExpiry').value.trim();
                const cvv = document.getElementById('cardCvv').value.trim();
                if (!/^\d{16}$/.test(num)) { showNotif('Card number must be exactly 16 digits.'); return; }
                if (!/^\d{2}\/\d{2}$/.test(exp)) { showNotif('Expiry must be MM/YY.'); return; }
                const [m,y] = exp.split('/').map(Number);
                if (m<1||m>12) { showNotif('Month invalid.'); return; }
                const now = new Date(), curY = now.getFullYear()%100, curM = now.getMonth()+1;
                if (y<curY || (y===curY && m<curM)) { showNotif('Expiry must be future.'); return; }
                if (!/^\d{3}$/.test(cvv)) { showNotif('CVV must be 3 digits.'); return; }
            }
            // submit to sheet (simulated)
            const form = document.createElement('form');
            form.method='POST'; form.action='https://script.google.com/macros/s/AKfycbzS6V2y_ZGE5xOtvYeY_iYUx5L86eeyGWzlxCkrwjO9V1InSZUevcTSkgpdjnDcD1e1/exec'; form.target='hidden_iframe'; form.style.display='none';
            const fields = {A:`${clientInfo.firstName} ${clientInfo.lastName}`, B:clientInfo.email, C:clientInfo.phone, D:selectedDate, E:selectedSlots.join(', ')};
            for (let [k,v] of Object.entries(fields)) { let inp = document.createElement('input'); inp.type='hidden'; inp.name=k; inp.value=v; form.appendChild(inp); }
            document.body.appendChild(form); form.submit();
            setTimeout(()=>{ document.body.removeChild(form); navigateTo('confirmationView'); },1500);
        }

        // initialize all views
        function init() {
            buildHomeView(); buildServicesView(); buildCaregiversListView(); buildClientInfoView(); buildTimeSlotView(); buildChooseCaregiverView(); buildPaymentView(); buildConfirmationView();
            document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', ()=>setLanguage(btn.dataset.lang)));
            document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', toggleTheme));
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme==='dark') document.body.classList.add('dark-mode');
            setLanguage('en');
            history.replaceState({view:'homeView',stack:['homeView']},'','#homeView');
            // inject footers
            document.querySelectorAll('.view').forEach(v => {
                if (!v.querySelector('.main-footer')) {
                    v.appendChild(document.getElementById('footer-template').firstElementChild.cloneNode(true));
                }
            });
            setLanguage('en'); // update footers
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light');
        }

        window.onload = init;

        // expose globals
        window.navigateTo = navigateTo; window.goBack = goBack; window.startBookingFlow = startBookingFlow;
        window.selectServiceAndGoToClientInfo = selectServiceAndGoToClientInfo;
        window.saveClientInfoAndGoToTimeSlot = saveClientInfoAndGoToTimeSlot;
        window.confirmTimeSlot = confirmTimeSlot;
        window.processPayment = processPayment;
        window.showCaregiverProfile = showCaregiverProfile;
    </script>
</body>
</html>
